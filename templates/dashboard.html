<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  /* FULL WIDTH CAROUSEL */
.carousel img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* OVERLAY TEXT */
.carousel {
  position: relative;
}
.carousel-text {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
  font-weight: bold;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">Home</a>
  <a href="/dashboard">Dashboard</a>
</div>
<!-- CAROUSEL -->
<div class="carousel">
<img id="slide" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
<div class="carousel-text">📊 Smart URL Analytics Dashboard</div>
</div>

<script>
var imgs = [
"https://images.unsplash.com/photo-1551288049-bebda4e38f71",
"https://images.unsplash.com/photo-1551288049-bebda4e38f71",
"https://images.unsplash.com/photo-1543286386-713bdd548da4",
"https://images.unsplash.com/photo-1519389950473-47ba0277781c"
];

var i=0;
setInterval(()=>{
i=(i+1)%imgs.length;
document.getElementById("slide").src=imgs[i];
},2500);
</script>

<h2 style="text-align:center;">📊 Dashboard</h2>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="80">

<table>
<tr>
<th>Short URL</th>
<th>Clicks</th>
<th>Stats</th>
</tr>

{% for d in data %}
<tr>
<td><a href="/{{d[2]}}">{{d[2]}}</a></td>
<td>{{d[3]}}</td>
<td><a href="/stats/{{d[2]}}">View</a></td>
</tr>
{% endfor %}

</table>

</body>
</html>
