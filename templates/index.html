<!DOCTYPE html>
<html>
<head>
<title>URL Shortener</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  /* FULL WIDTH CAROUSEL */
.carousel img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* OVERLAY TEXT */
.carousel {
  position: relative;
}
.carousel-text {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
  font-weight: bold;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">Home</a>
  <a href="/dashboard">Dashboard</a>
</div>
<!-- CAROUSEL -->
<div class="carousel">
<img id="slide" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
<div class="carousel-text">📊 Smart URL Analytics Dashboard</div>
</div>

<script>
var imgs = [
"https://images.unsplash.com/photo-1551288049-bebda4e38f71",
"https://images.unsplash.com/photo-1551288049-bebda4e38f71",
"https://images.unsplash.com/photo-1543286386-713bdd548da4",
"https://images.unsplash.com/photo-1519389950473-47ba0277781c"
];

var i=0;
setInterval(()=>{
i=(i+1)%imgs.length;
document.getElementById("slide").src=imgs[i];
},2500);
</script>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" width="80">

<h2>🔗 URL Shortener</h2>

<form method="POST">
<input name="url" placeholder="Enter URL" required>
<input type="datetime-local" name="expiry">
<button>Shorten</button>
</form>

{% if short %}
<p>
<a href="/{{short}}" target="_blank">
http://localhost:5000/{{short}}
</a>
</p>

<button onclick="copyText('http://localhost:5000/{{short}}')">Copy</button>
{% endif %}

</div>

<script>
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
